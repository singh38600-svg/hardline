name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.2

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build and test
        run: npm run check
